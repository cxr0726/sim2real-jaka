- Left_wrist_roll_Link
- Left_wrist_yaw_Link
- Right_shoulder_pitch_Link
- Right_shoulder_roll_Link
- Right_shoulder_yaw_Link
- Right_elbow_Link
- Right_wrist_roll_Link
- Right_wrist_yaw__Link
- Neck_yaw_Link
- Neck_pitch_Link

# Policy action order — IsaacLab order (the order the ONNX model outputs actions)
policy_joint_names:
- Left_hip_pitch_joint
- Right_hip_pitch_joint
- waist_yaw_joint
- Left_hip_roll_joint
- Right_hip_roll_joint
- Left_shoulder_pitch_joint
- Neck_yaw_joint
- Right_shoulder_pitch_joint
- Left_hip_yaw_joint
- Right_hip_yaw_joint
- Left_shoulder_roll_joint
- Neck_pitch_joint
- Right_shoulder_roll_joint
- Left_knee_joint
- Right_knee_joint
- Left_shoulder_yaw_joint
- Right_shoulder_yaw_joint
- Left_ankle_pitch_joint
- Right_ankle_pitch_joint
- Left_elbow_joint
- Right_elbow_joint
- Left_ankle_roll_joint
- Right_ankle_roll_joint
- Left_wrist_roll_joint
- Right_wrist_roll_joint
- Left_wrist_yaw_joint
- Right_wrist_yaw_joint

# PD gains (from deploy script stiffness_dict / damping_dict)
joint_kp:
  .*_hip_pitch_joint|.*_hip_roll_joint|.*_hip_yaw_joint|.*_knee_joint: 187.0
  .*_ankle_pitch_joint: 100.0
  .*_ankle_roll_joint: 50.0
  waist_yaw_joint: 187.0
  .*_shoulder_pitch_joint|.*_shoulder_roll_joint: 102.0
  .*_shoulder_yaw_joint|.*_elbow_joint: 40.8
  .*_wrist_roll_joint|.*_wrist_yaw_joint: 6.7
  Neck_yaw_joint: 6.7
  Neck_pitch_joint: 6.7

joint_kd:
  .*_hip_pitch_joint|.*_hip_roll_joint|.*_hip_yaw_joint|.*_knee_joint: 18.7
  .*_ankle_pitch_joint: 2.0
  .*_ankle_roll_joint: 0.5
  waist_yaw_joint: 18.7
  .*_shoulder_pitch_joint|.*_shoulder_roll_joint: 10.2
  .*_shoulder_yaw_joint|.*_elbow_joint: 4.0
  .*_wrist_roll_joint|.*_wrist_yaw_joint: 0.67
  Neck_yaw_joint: 0.67
  Neck_pitch_joint: 0.67

# Default standing pose (only non-zero joints)
default_joint_pos:
  Left_shoulder_roll_joint: -1.57
  Left_elbow_joint: 1.57
  Left_wrist_yaw_joint: 0.3
  Right_shoulder_roll_joint: -1.57
  Right_elbow_joint: 1.57
  Right_wrist_yaw_joint: 0.3

# Uniform action scale for all joints
action_scale: 0.5

# Clip raw policy action to [-5, 5] before scaling (from deploy script)
action_clip: 5.0

