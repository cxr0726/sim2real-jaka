    jaka_obs_stack:
      _target_: jaka_frame_stack
      anchor_body_index: 3       # waist_yaw_Link in IsaacLab BFS order
      ang_vel_scale: 0.25
      joint_vel_scale: 0.05

# MuJoCo joint order (from Khan_mini_simplified XML)
joint_names_simulation:
- Left_hip_pitch_joint
- Left_hip_roll_joint
- Left_hip_yaw_joint
- Left_knee_joint
- Left_ankle_pitch_joint
- Left_ankle_roll_joint
- Right_hip_pitch_joint
- Right_hip_roll_joint
- Right_hip_yaw_joint
- Right_knee_joint
- Right_ankle_pitch_joint
- Right_ankle_roll_joint
- waist_yaw_joint
- Left_shoulder_pitch_joint
- Left_shoulder_roll_joint
- Left_shoulder_yaw_joint
- Left_elbow_joint
- Left_wrist_roll_joint
- Left_wrist_yaw_joint
- Right_shoulder_pitch_joint
- Right_shoulder_roll_joint
- Right_shoulder_yaw_joint
- Right_elbow_joint
- Right_wrist_roll_joint
- Right_wrist_yaw_joint
- Neck_yaw_joint
- Neck_pitch_joint

# MuJoCo body order (from Khan_mini_simplified XML)
body_names_simulation:
- base_link
- Left_hip_pitch_Link
- Left_hip_roll_Link
- Left_hip_yaw_Link
- Left_knee_Link
- Left_ankle_pitch_Link
